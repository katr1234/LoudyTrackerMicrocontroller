services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: server:latest
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend:latest
    ports:
      - "3000:3000"
    restart: always
    environment:
      HOST: 0.0.0.0
      PORT: 3000