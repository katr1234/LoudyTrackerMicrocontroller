services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: server:latest
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/loudy.db
      - THRESHOLD_DB=85.0
    volumes:
      - db-data:/data
    restart: always

